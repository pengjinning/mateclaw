    <text x="65" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1d1612">MCP Protocol</text>
    <text x="65" y="31" text-anchor="middle" font-size="9" fill="#9b7d6c">stdio / SSE / HTTP</text>
  </g>
  <g transform="translate(488, 488)">
    <rect width="130" height="40" rx="8" fill="#fff" stroke="#d9cec2" stroke-width="0.5"/>
    <text x="65" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1d1612">Docker Compose</text>
    <text x="65" y="31" text-anchor="middle" font-size="9" fill="#9b7d6c">One-click Deploy</text>
  </g>
  <g transform="translate(632, 488)">
    <rect width="130" height="40" rx="8" fill="#fff" stroke="#d9cec2" stroke-width="0.5"/>
    <text x="65" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1d1612">Cron Scheduler</text>
    <text x="65" y="31" text-anchor="middle" font-size="9" fill="#9b7d6c">Task Automation</text>
  </g>
  <g transform="translate(776, 488)">
