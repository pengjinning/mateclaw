name: "✨ 功能建议（中文）"
description: 提一个新功能或改进。先讲为什么，再讲是什么。
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        新功能的关键不是"它是什么"，是"**没有它，谁在受什么苦**"。

        如果你说不清谁会用、为什么用，这个功能大概率不该做。

  - type: textarea
    id: why
    attributes:
      label: 你在解决什么问题？（必填）
      description: |
        描述真实场景。**不要直接写"应该加一个 XX 按钮"** —— 先说为什么要这个按钮、不加会怎样。
      placeholder: |
        例：我每天要给 5 个不同的 Agent 切换默认模型，每次都要进设置页改 3 处。
        如果有一个"快速切换默认模型"的全局菜单，我每天能少点 30 次鼠标。
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: 你期望它怎么工作？（必填）
      description: |
        一段话或几个 bullet。如果你能画个草图、贴个 mockup，更好（直接拖图）。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你试过的替代方案？（选填）
      description: |
        如果想不到替代方案，就空着。**不要为了填字段而瞎写。**
    validations:
      required: false
